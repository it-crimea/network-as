name: Update Network Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create etag directory if not exists
        run: |
          mkdir -p etag

      - name: Check if update needed
        id: check
        run: |
          if [ ! -f all-network.txt ]; then
            echo "need_update=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          REMOTE_ETAG=$(curl -sI https://bgp.nsrc.org/REN/.combined/data-raw-table | grep -i etag | awk -F'"' '{print $2}')
          
          if [ -z "$REMOTE_ETAG" ]; then
            echo "need_update=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [ -f "etag/.etag-network" ]; then
            LOCAL_ETAG=$(cat etag/.etag-network)
            if [ "$REMOTE_ETAG" == "$LOCAL_ETAG" ]; then
              echo "need_update=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          
          echo "need_update=true" >> $GITHUB_OUTPUT

      - name: Download file
        if: steps.check.outputs.need_update == 'true'
        run: |
          curl -L -o all-network.txt https://bgp.nsrc.org/REN/.combined/data-raw-table
          curl -sI https://bgp.nsrc.org/REN/.combined/data-raw-table | grep -i etag | awk -F'"' '{print $2}' > etag/.etag-network

      - name: Commit and push
        if: steps.check.outputs.need_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add all-network.txt etag/.etag-network
          git diff --staged --quiet || git commit -m "Update network data"
          git push
