name: Update Network Data

on:
  workflow_dispatch:   # Позволяет запускать вручную
  schedule:
    - cron: '0 6 * * *'  # Автоматический запуск каждый день в 6:00 UTC

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Даёт права на запись в репозиторий

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download data-raw-table
        run: |
          # Скачиваем файл с помощью curl
          curl -sSfL https://bgp.nsrc.org/REN/.combined/data-raw-table -o data-raw-table.txt
          echo "✅ File downloaded successfully."

      - name: Check for changes and commit
        run: |
          # Проверяем, существует ли файл
          if [ ! -f data-raw-table.txt ]; then
            echo "ℹ️ File does not exist, creating..."
            curl -sSfL https://bgp.nsrc.org/REN/.combined/data-raw-table -o data-raw-table.txt
          fi

          # Проверяем, изменился ли файл
          if git diff --quiet data-raw-table.txt; then
            echo "ℹ️ No changes detected. Nothing to commit."
            exit 0
          fi

          # Настраиваем git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Добавляем, коммитим и пушим изменения
          git add data-raw-table.txt
          git commit -m "Automated update: data-raw-table [skip ci]"
          git push

          echo "✅ Changes committed and pushed."
          
