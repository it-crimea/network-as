name: Update Network Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download network data
        run: |
          curl -L -o all-network.txt https://bgp.nsrc.org/REN/.combined/data-raw-table
          echo "✅ File downloaded: $(wc -c < all-network.txt) bytes"

      - name: Commit and push (force)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Всегда добавляем файл
          git add -f all-network.txt
          
          # Всегда создаем коммит (даже если нет изменений)
          git commit -m "🔄 Network data update [$(date '+%Y-%m-%d %H:%M:%S')] [skip ci]" || true
          
          # Пушим
          git push
